<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Денис Файзельгаянов</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated background particles */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }
  .bg span {
    position: absolute;
    border-radius: 50%;
    animation: float linear infinite;
    opacity: 0.08;
  }
  .bg span:nth-child(1)  { width:300px;height:300px;background:#7c3aed;top:10%;left:5%;animation-duration:18s; }
  .bg span:nth-child(2)  { width:200px;height:200px;background:#2563eb;top:60%;left:75%;animation-duration:24s;animation-delay:-6s; }
  .bg span:nth-child(3)  { width:150px;height:150px;background:#06b6d4;top:80%;left:20%;animation-duration:20s;animation-delay:-3s; }
  .bg span:nth-child(4)  { width:400px;height:400px;background:#7c3aed;top:-10%;left:60%;animation-duration:30s;animation-delay:-10s; }
  .bg span:nth-child(5)  { width:100px;height:100px;background:#f59e0b;top:45%;left:45%;animation-duration:15s;animation-delay:-8s; }

  @keyframes float {
    0%   { transform: translateY(0) scale(1); }
    50%  { transform: translateY(-40px) scale(1.05); }
    100% { transform: translateY(0) scale(1); }
  }

  .card {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 60px 50px 50px;
    max-width: 480px;
    width: 90%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 28px;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 80px rgba(124,58,237,0.15), 0 30px 60px rgba(0,0,0,0.5);
    animation: cardIn 0.8s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0)   scale(1); }
  }

  /* Avatar */
  .avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    margin: 0 auto 28px;
    background: linear-gradient(135deg, #7c3aed, #2563eb, #06b6d4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -1px;
    box-shadow: 0 0 0 4px rgba(124,58,237,0.3), 0 0 30px rgba(124,58,237,0.4);
    animation: pulse 3s ease-in-out infinite;
    position: relative;
  }
  .avatar::after {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid transparent;
    background: linear-gradient(#0a0a0a,#0a0a0a) padding-box,
                linear-gradient(135deg,#7c3aed,#2563eb,#06b6d4) border-box;
    animation: spin 4s linear infinite;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 4px rgba(124,58,237,0.3), 0 0 30px rgba(124,58,237,0.4); }
    50%      { box-shadow: 0 0 0 8px rgba(124,58,237,0.15), 0 0 50px rgba(124,58,237,0.6); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Name */
  .name {
    font-size: clamp(26px, 6vw, 38px);
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, #c4b5fd 40%, #93c5fd 70%, #67e8f9 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(167,139,250,0.5));
    animation: glow 3s ease-in-out infinite alternate;
  }

  @keyframes glow {
    from { filter: drop-shadow(0 0 10px rgba(167,139,250,0.4)); }
    to   { filter: drop-shadow(0 0 30px rgba(167,139,250,0.9)) drop-shadow(0 0 60px rgba(96,165,250,0.4)); }
  }

  /* Role */
  .role {
    margin-top: 12px;
    font-size: 15px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2.5px;
    text-transform: uppercase;
  }

  /* Divider */
  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #7c3aed, #2563eb, transparent);
    margin: 28px auto;
    border-radius: 2px;
  }

  /* Social icons */
  .socials {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-bottom: 36px;
  }

  .social-link {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 52px;
    height: 52px;
    border-radius: 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    text-decoration: none;
    color: rgba(255,255,255,0.6);
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
    overflow: hidden;
  }

  .social-link::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .social-link.telegram::before { background: linear-gradient(135deg, #229ED9, #1a7fc1); }
  .social-link.vk::before       { background: linear-gradient(135deg, #4680C2, #2d5a8e); }
  .social-link.whatsapp::before { background: linear-gradient(135deg, #25D366, #128C7E); }

  .social-link:hover {
    transform: translateY(-6px) scale(1.12);
    border-color: transparent;
    color: #fff;
    box-shadow: 0 12px 30px rgba(0,0,0,0.4);
  }
  .social-link:hover::before { opacity: 1; }

  .social-link svg {
    width: 22px;
    height: 22px;
    position: relative;
    z-index: 1;
    transition: transform 0.3s;
  }
  .social-link:hover svg { transform: scale(1.1); }

  /* Tooltip */
  .social-link[data-tip] {
    --tip: attr(data-tip);
  }
  .social-link::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%) translateY(6px);
    background: rgba(20,20,30,0.95);
    color: rgba(255,255,255,0.9);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 5px 10px;
    border-radius: 8px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .social-link:hover::after {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* CTA Button */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 40px;
    border-radius: 50px;
    background: linear-gradient(135deg, #7c3aed, #2563eb);
    color: #fff;
    text-decoration: none;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3px;
    border: none;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
    box-shadow: 0 4px 20px rgba(124,58,237,0.4);
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #9d63f5, #3b82f6);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .btn::after {
    content: '';
    position: absolute;
    width: 150%;
    height: 150%;
    top: -25%;
    left: -150%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transition: left 0.5s;
  }

  .btn:hover {
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 10px 40px rgba(124,58,237,0.6);
  }
  .btn:hover::before { opacity: 1; }
  .btn:hover::after  { left: 150%; }
  .btn:active { transform: translateY(0) scale(0.98); }

  .btn span, .btn svg { position: relative; z-index: 1; }
  .btn svg { width: 18px; height: 18px; }

  /* Footer tag */
  .tag {
    margin-top: 30px;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1px;
  }

  @media (max-width: 400px) {
    .card { padding: 44px 28px 40px; }
  }
</style>
</head>
