<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>СайтМейкер — Конструктор сайтов</title>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0F0C09;
  --surface:  #1A1511;
  --surface2: #221C16;
  --border:   rgba(245,237,228,0.07);
  --coral:    #D97757;
  --text:     #F5EDE4;
  --muted:    rgba(245,237,228,0.45);
  --muted2:   rgba(245,237,228,0.18);
  --sidebar:  240px;
  --topbar:   52px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Topbar ── */
#topbar {
  height: var(--topbar);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  flex-shrink: 0;
  z-index: 10;
}

.tb-logo {
  font-size: 15px;
  font-weight: 800;
  background: linear-gradient(90deg, #D97757, #E8C07A);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.3px;
  margin-right: 8px;
}

.tb-sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

.tb-label { font-size: 11px; color: var(--muted); font-weight: 600; white-space: nowrap; }

.tb-select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  outline: none;
}
.tb-select option { background: #221C16; }

.tb-spacer { flex: 1; }

.tb-device { display: flex; gap: 4px; }
.tb-dev-btn {
  padding: 6px 10px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}
.tb-dev-btn.active { background: rgba(217,119,87,0.15); border-color: var(--coral); color: var(--coral); }
.tb-dev-btn:hover:not(.active) { color: var(--text); border-color: var(--muted2); }

.btn-download {
  padding: 8px 20px;
  border-radius: 8px;
  background: linear-gradient(135deg, #D97757, #B85C35);
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: opacity 0.2s;
  white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
}
.btn-download:hover { opacity: 0.85; }

/* ── Layout ── */
#layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

.sb-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.sb-tab {
  flex: 1;
  padding: 11px 4px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.sb-tab.active { color: var(--coral); border-bottom-color: var(--coral); }
.sb-tab:hover:not(.active) { color: var(--text); }

.sb-panel { display: none; flex: 1; overflow-y: auto; padding: 14px 12px; }
.sb-panel.active { display: block; }
.sb-panel::-webkit-scrollbar { width: 3px; }
.sb-panel::-webkit-scrollbar-thumb { background: rgba(217,119,87,0.3); border-radius: 2px; }

/* Template cards */
.tpl-card {
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.tpl-card:hover { border-color: rgba(217,119,87,0.4); }
.tpl-card.active { border-color: var(--coral); box-shadow: 0 0 0 1px var(--coral); }
.tpl-thumb {
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  border-bottom: 1px solid var(--border);
}
.tpl-label { padding: 8px 10px; font-size: 12px; font-weight: 700; color: var(--text); }
.tpl-desc  { padding: 0 10px 10px; font-size: 11px; color: var(--muted); line-height: 1.5; }
.tpl-card.active .tpl-label { color: var(--coral); }

/* Section toggles */
.sec-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 8px;
  border-radius: 8px;
  margin-bottom: 4px;
  transition: background 0.15s;
}
.sec-item:hover { background: var(--surface2); }
.sec-name { flex: 1; font-size: 12px; font-weight: 600; color: var(--text); }
.sec-toggle {
  position: relative;
  width: 32px; height: 18px;
  background: var(--muted2);
  border-radius: 9px;
  cursor: pointer;
  transition: background 0.2s;
  border: none;
  flex-shrink: 0;
}
.sec-toggle.on { background: var(--coral); }
.sec-toggle::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 12px; height: 12px;
  background: #fff;
  border-radius: 50%;
  transition: left 0.2s;
}
.sec-toggle.on::after { left: 17px; }
.sec-drag { color: var(--muted2); cursor: grab; font-size: 14px; }

/* Theme colors */
.sb-section-title { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin: 14px 0 8px; }
.theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 16px; }
.theme-swatch {
  height: 36px;
  border-radius: 8px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
  position: relative;
}
.theme-swatch:hover { transform: scale(1.05); }
.theme-swatch.active { border-color: #fff; }
.theme-swatch::after {
  content: attr(data-name);
  position: absolute;
  bottom: -18px; left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  color: var(--muted);
  white-space: nowrap;
  font-weight: 600;
}

/* Font size */
.font-row { display: flex; align-items: center; gap: 8px; margin-top: 24px; }
.font-row label { font-size: 11px; color: var(--muted); font-weight: 600; flex: 1; }
.font-row input[type=range] {
  flex: 2;
  accent-color: var(--coral);
}
.font-size-val { font-size: 11px; color: var(--text); font-weight: 700; width: 28px; text-align: right; }

/* ── Preview area ── */
#preview-wrap {
  flex: 1;
  overflow: auto;
  background: #1C1A18;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px;
}
#preview-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
#preview-wrap::-webkit-scrollbar-thumb { background: rgba(245,237,228,0.15); border-radius: 3px; }

#preview-frame {
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  width: 100%;
  max-width: 960px;
  transition: max-width 0.3s;
}
#preview-frame.mobile { max-width: 390px; }
#preview-frame.tablet { max-width: 768px; }

/* ── SITE CSS (inside preview) ── */
#site-content {
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.6;
  color: #1a1a1a;
}

/* Editable hint */
#site-content [contenteditable]:hover {
  outline: 2px dashed rgba(217,119,87,0.4);
  outline-offset: 2px;
  border-radius: 3px;
  cursor: text;
}
#site-content [contenteditable]:focus {
  outline: 2px solid #D97757;
  outline-offset: 2px;
  border-radius: 3px;
}

/* ── Site sections ── */
.s-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 40px;
  background: var(--site-bg, #0F0C09);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.s-nav-logo { font-size: 18px; font-weight: 800; color: var(--site-primary, #D97757); }
.s-nav-cta {
  padding: 8px 20px;
  background: var(--site-primary, #D97757);
  color: #fff;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  border: none;
  cursor: pointer;
}

.s-hero {
  background: var(--site-bg, #0F0C09);
  color: #fff;
  text-align: center;
  padding: 80px 40px 70px;
}
.s-hero-tag {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--site-accent, #E8C07A);
  margin-bottom: 24px;
}
.s-hero h1 {
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 900;
  letter-spacing: -1px;
  line-height: 1.1;
  margin-bottom: 18px;
  background: linear-gradient(135deg, #fff, var(--site-accent, #E8C07A));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.s-hero p {
  font-size: 18px;
  color: rgba(255,255,255,0.55);
  max-width: 540px;
  margin: 0 auto 36px;
}
.s-hero-btn {
  display: inline-block;
  padding: 16px 44px;
  background: linear-gradient(135deg, var(--site-primary, #D97757), var(--site-dark, #B85C35));
  color: #fff;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}

.s-services {
  padding: 70px 40px;
  background: #fff;
}
.s-section-tag {
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--site-primary, #D97757);
  margin-bottom: 10px;
}
.s-section-title {
  text-align: center;
  font-size: clamp(22px, 4vw, 36px);
  font-weight: 800;
  letter-spacing: -0.5px;
  color: #111;
  margin-bottom: 48px;
}
.s-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
}
.s-card {
  background: #F8F5F2;
  border-radius: 16px;
  padding: 28px 22px;
  border: 1px solid rgba(0,0,0,0.05);
  transition: box-shadow 0.2s;
}
.s-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
.s-card-icon { font-size: 32px; margin-bottom: 14px; }
.s-card h3 { font-size: 16px; font-weight: 700; color: #111; margin-bottom: 8px; }
.s-card p  { font-size: 13px; color: #666; line-height: 1.6; }
.s-card-price { margin-top: 12px; font-size: 15px; font-weight: 800; color: var(--site-primary, #D97757); }

.s-about {
  padding: 70px 40px;
  background: var(--site-bg, #0F0C09);
  color: #fff;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}
.s-about h2 { font-size: clamp(22px,3.5vw,34px); font-weight: 800; line-height: 1.2; margin-bottom: 16px; }
.s-about p  { font-size: 15px; color: rgba(255,255,255,0.55); line-height: 1.8; margin-bottom: 24px; }
.s-about-stats { display: flex; gap: 32px; }
.s-stat-num { font-size: 36px; font-weight: 900; color: var(--site-primary, #D97757); line-height: 1; }
.s-stat-label { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; }
.s-about-visual {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  height: 240px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
}

.s-team {
  padding: 70px 40px;
  background: #fff;
}
.s-team-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 24px;
}
.s-team-card {
  text-align: center;
  padding: 32px 20px;
  background: #F8F5F2;
  border-radius: 16px;
  border: 1px solid rgba(0,0,0,0.05);
}
.s-team-avatar {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--site-primary, #D97757), var(--site-dark, #B85C35));
  margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: #fff; font-weight: 700;
}
.s-team-card h3 { font-size: 16px; font-weight: 700; color: #111; margin-bottom: 4px; }
.s-team-card p  { font-size: 13px; color: #888; }

.s-reviews {
  padding: 70px 40px;
  background: #F8F5F2;
}
.s-reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}
.s-review {
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  border: 1px solid rgba(0,0,0,0.05);
}
.s-review-stars { color: #F59E0B; font-size: 14px; margin-bottom: 12px; }
.s-review-text { font-size: 14px; color: #444; line-height: 1.7; margin-bottom: 16px; }
.s-review-author { font-size: 13px; font-weight: 700; color: #111; }

.s-cta {
  padding: 70px 40px;
  background: linear-gradient(135deg, var(--site-bg, #0F0C09) 0%, #1a0e08 100%);
  color: #fff;
  text-align: center;
}
.s-cta h2 { font-size: clamp(24px,4vw,40px); font-weight: 800; margin-bottom: 14px; }
.s-cta p  { font-size: 16px; color: rgba(255,255,255,0.5); margin-bottom: 36px; }
.s-cta-btn {
  display: inline-block;
  padding: 16px 44px;
  background: linear-gradient(135deg, var(--site-primary, #D97757), var(--site-dark, #B85C35));
  color: #fff;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}

.s-contacts {
  padding: 50px 40px;
  background: var(--site-bg, #0F0C09);
  border-top: 1px solid rgba(255,255,255,0.06);
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 24px;
  color: #fff;
}
.s-contact-item h4 { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 8px; }
.s-contact-item p  { font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.85); }

.s-footer {
  padding: 20px 40px;
  background: var(--site-bg, #0F0C09);
  border-top: 1px solid rgba(255,255,255,0.05);
  text-align: center;
  font-size: 12px;
  color: rgba(255,255,255,0.2);
}

/* Responsive inside preview */
@media (max-width: 600px) {
  .s-about { grid-template-columns: 1fr; }
  .s-about-visual { display: none; }
  .s-nav { padding: 14px 20px; }
  .s-hero, .s-services, .s-about, .s-team, .s-reviews, .s-cta, .s-contacts { padding-left: 20px; padding-right: 20px; }
}

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: #221C16;
  border: 1px solid rgba(217,119,87,0.3);
  color: #F5EDE4;
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 13px; font-weight: 600;
  z-index: 999;
  opacity: 0; transform: translateY(8px);
  transition: all 0.25s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- Topbar -->
<div id="topbar">
  <span class="tb-logo">СайтМейкер</span>
  <div class="tb-sep"></div>
  <span class="tb-label">Шаблон:</span>
  <select class="tb-select" id="tplSelect" onchange="switchTemplate(this.value)">
    <option value="beauty">💅 Салон красоты</option>
    <option value="medical">🏥 Медицина / Клиника</option>
    <option value="education">📚 Образование / Курсы</option>
  </select>
  <div class="tb-spacer"></div>
  <div class="tb-device">
    <button class="tb-dev-btn active" data-w="960" onclick="setDevice(this, 960)">🖥 ПК</button>
    <button class="tb-dev-btn" data-w="768" onclick="setDevice(this, 768)">📱 Планшет</button>
    <button class="tb-dev-btn" data-w="390" onclick="setDevice(this, 390)">📱 Телефон</button>
  </div>
  <div class="tb-sep"></div>
  <button class="btn-download" onclick="downloadHTML()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Скачать HTML
  </button>
</div>

<!-- Layout -->
<div id="layout">

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sb-tabs">
      <button class="sb-tab active" onclick="switchTab('templates',this)">Шаблон</button>
      <button class="sb-tab" onclick="switchTab('sections',this)">Секции</button>
      <button class="sb-tab" onclick="switchTab('style',this)">Стиль</button>
    </div>

    <!-- Templates tab -->
    <div class="sb-panel active" id="tab-templates">
      <div class="tpl-card active" data-tpl="beauty" onclick="selectTpl('beauty',this)">
        <div class="tpl-thumb" style="background:linear-gradient(135deg,#2D1A14,#3D2418)">💅</div>
        <div class="tpl-label">Салон красоты</div>
        <div class="tpl-desc">Маникюр, парикмахерская, массаж, СПА</div>
      </div>
      <div class="tpl-card" data-tpl="medical" onclick="selectTpl('medical',this)">
        <div class="tpl-thumb" style="background:linear-gradient(135deg,#0E1D2E,#102436)">🏥</div>
        <div class="tpl-label">Медицина / Клиника</div>
        <div class="tpl-desc">Стоматология, терапия, педиатрия</div>
      </div>
      <div class="tpl-card" data-tpl="education" onclick="selectTpl('education',this)">
        <div class="tpl-thumb" style="background:linear-gradient(135deg,#1A0E2E,#21103A)">📚</div>
        <div class="tpl-label">Образование / Курсы</div>
        <div class="tpl-desc">Языковые школы, IT-курсы, репетиторы</div>
      </div>
    </div>

    <!-- Sections tab -->
    <div class="sb-panel" id="tab-sections">
      <div id="sections-list"></div>
    </div>

    <!-- Style tab -->
    <div class="sb-panel" id="tab-style">
      <div class="sb-section-title">Цветовая тема</div>
      <div class="theme-grid" style="margin-bottom:30px">
        <div class="theme-swatch active" data-name="Коралл"
          style="background:linear-gradient(135deg,#D97757,#B85C35)"
          data-primary="#D97757" data-dark="#B85C35" data-accent="#E8C07A" data-bg="#0F0C09"
          onclick="setTheme(this)"></div>
        <div class="theme-swatch" data-name="Океан"
          style="background:linear-gradient(135deg,#2563EB,#1D4ED8)"
          data-primary="#2563EB" data-dark="#1D4ED8" data-accent="#67E8F9" data-bg="#060B14"
          onclick="setTheme(this)"></div>
        <div class="theme-swatch" data-name="Изумруд"
          style="background:linear-gradient(135deg,#059669,#047857)"
          data-primary="#059669" data-dark="#047857" data-accent="#6EE7B7" data-bg="#06100D"
          onclick="setTheme(this)"></div>
        <div class="theme-swatch" data-name="Аметист"
          style="background:linear-gradient(135deg,#7C3AED,#6D28D9)"
          data-primary="#7C3AED" data-dark="#6D28D9" data-accent="#C4B5FD" data-bg="#0C0618"
          onclick="setTheme(this)"></div>
        <div class="theme-swatch" data-name="Золото"
          style="background:linear-gradient(135deg,#D97706,#B45309)"
          data-primary="#D97706" data-dark="#B45309" data-accent="#FCD34D" data-bg="#100E06"
          onclick="setTheme(this)"></div>
        <div class="theme-swatch" data-name="Роза"
          style="background:linear-gradient(135deg,#E11D48,#BE123C)"
          data-primary="#E11D48" data-dark="#BE123C" data-accent="#FDA4AF" data-bg="#10060A"
          onclick="setTheme(this)"></div>
      </div>

      <div class="sb-section-title">Размер текста</div>
      <div class="font-row">
        <label>Шрифт</label>
        <input type="range" min="14" max="20" value="16" id="fontRange"
          oninput="setFontSize(this.value)">
        <span class="font-size-val" id="fontVal">16px</span>
      </div>
    </div>
  </div>

  <!-- Preview -->
  <div id="preview-wrap">
    <div id="preview-frame">
      <div id="site-content"></div>

// ── State ──
let currentTpl = 'beauty';
let sectionVisibility = {};

function getCurrentSections() {
  return TEMPLATES[currentTpl].sections.map(s => ({
    ...s,
    visible: sectionVisibility[currentTpl + '_' + s.id] !== undefined
      ? sectionVisibility[currentTpl + '_' + s.id]
      : s.visible
  }));
}

// ── Render ──
function renderPreview() {
  const sections = getCurrentSections();
  const site = document.getElementById('site-content');

  // Apply theme CSS vars
  site.style.setProperty('--site-primary', currentTheme.primary);
  site.style.setProperty('--site-dark',    currentTheme.dark);
  site.style.setProperty('--site-accent',  currentTheme.accent);
  site.style.setProperty('--site-bg',      currentTheme.bg);

  site.innerHTML = sections
    .filter(s => s.visible)
    .map(s => `<div data-section="${s.id}">${s.html}</div>`)
    .join('');
}

function renderSectionsList() {
  const sections = getCurrentSections();
  const list = document.getElementById('sections-list');
  list.innerHTML = sections.map(s => `
    <div class="sec-item">
      <span class="sec-drag">⠿</span>
      <span class="sec-name">${s.label}</span>
      <button class="sec-toggle ${s.visible ? 'on' : ''}"
        onclick="toggleSection('${s.id}', this)"></button>
    </div>
  `).join('');
}

function toggleSection(id, btn) {
  const key = currentTpl + '_' + id;
  const sections = getCurrentSections();
  const sec = sections.find(s => s.id === id);
  const newVal = !sec.visible;
  sectionVisibility[key] = newVal;
  btn.classList.toggle('on', newVal);
  renderPreview();
}

// ── Template switch ──
function switchTemplate(tpl) {
  currentTpl = tpl;
  document.getElementById('tplSelect').value = tpl;
  document.querySelectorAll('.tpl-card').forEach(c => {
    c.classList.toggle('active', c.dataset.tpl === tpl);
  });
  renderPreview();
  renderSectionsList();
}

function selectTpl(tpl, el) {
  switchTemplate(tpl);
}

// ── Tabs ──
function switchTab(name, btn) {
  document.querySelectorAll('.sb-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.sb-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// ── Theme ──
function setTheme(el) {
  currentTheme = {
    primary: el.dataset.primary,
    dark:    el.dataset.dark,
    accent:  el.dataset.accent,
    bg:      el.dataset.bg,
  };
  document.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  const site = document.getElementById('site-content');
  site.style.setProperty('--site-primary', currentTheme.primary);
  site.style.setProperty('--site-dark',    currentTheme.dark);
  site.style.setProperty('--site-accent',  currentTheme.accent);
  site.style.setProperty('--site-bg',      currentTheme.bg);
}

// ── Font size ──
function setFontSize(v) {
  document.getElementById('site-content').style.fontSize = v + 'px';
  document.getElementById('fontVal').textContent = v + 'px';
}

// ── Device ──
function setDevice(btn, w) {
  document.querySelectorAll('.tb-dev-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const frame = document.getElementById('preview-frame');
  frame.style.maxWidth = w + 'px';
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
